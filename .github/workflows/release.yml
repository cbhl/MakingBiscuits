name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0 or 0.1.0-alpha.1), no leading "v"'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate version input
        run: |
          version="${{ inputs.version }}"
          if [[ "$version" == v* ]]; then
            echo "::error::Version should not have a leading 'v' (got '$version')" >&2
            exit 1
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$version' is not a valid semver string" >&2
            exit 1
          fi

      - name: Update manifest.json version
        run: |
          sed -i "s/\"Version\": \"[^\"]*\"/\"Version\": \"${{ inputs.version }}\"/" "[CP] MakingBiscuits/manifest.json"
          grep '"Version"' "[CP] MakingBiscuits/manifest.json"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "[CP] MakingBiscuits/manifest.json"
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Build release zip
        run: |
          zip -r "MakingBiscuits-${{ inputs.version }}.zip" "[CP] MakingBiscuits" -x "*.gitkeep"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            ## Installation

            1. Install the prerequisites: Stardew Valley, SMAPI, and Content Patcher.
            2. Unzip Making Biscuits into your `Stardew Valley/Mods` folder, so you end up with `Mods/[CP] MakingBiscuits`.
            3. Launch the game through SMAPI (double-click `StardewModdingAPI.exe` in your `Stardew Valley` folder).

            SMAPI and Content Patcher are from the below sources, and the vendored binaries are provided here for your convenience.
            - [SMAPI](https://smapi.io/)
            - [Content Patcher](https://www.nexusmods.com/stardewvalley/mods/1915)

          generate_release_notes: true
          files: |
            MakingBiscuits-${{ inputs.version }}.zip
            vendor/Content Patcher 2.9.1.zip
            vendor/SMAPI-4.5.2-installer.zip
