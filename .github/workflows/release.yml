name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0 or 0.1.0-alpha.1), no leading "v"'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate version input
        run: |
          version="${{ inputs.version }}"
          if [[ "$version" == v* ]]; then
            echo "::error::Version should not have a leading 'v' (got '$version')" >&2
            exit 1
          fi
          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$version' is not a valid semver string" >&2
            exit 1
          fi

      - name: Update manifest.json version
        run: |
          sed -i "s/\"Version\": \"[^\"]*\"/\"Version\": \"${{ inputs.version }}\"/" "[CP] MakingBiscuits/manifest.json"
          grep '"Version"' "[CP] MakingBiscuits/manifest.json"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "[CP] MakingBiscuits/manifest.json"
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin HEAD:main
          git push origin "v${{ inputs.version }}"

      - name: Build release zip
        run: |
          zip -r "MakingBiscuits-${{ inputs.version }}.zip" "[CP] MakingBiscuits" -x "*.gitkeep"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: |
            Happy birf! Here is a smol cat content pack for you:
            
            <img width="638" height="359" alt="screenshot2" src="https://github.com/user-attachments/assets/3d567c39-3ea1-4860-889d-67640ba6c8a1" />
            
            ## Quick Start
            
            Vendored binaries for SMAPI and Content Patcher are included here for convenience; the paranoid should probably check hashes against upstream (or get them from upstream).
            
            1. Run the Stardew Valley game without SMAPI at least once (so it can do first-time setup).
            2. If you don't already have it, install the SMAPI (extract the `.zip` file somewhere and double-click `install on Windows.bat`).
              - After this is done you should have a `Mods` folder in your `Stardew Valley` folder with the default SMAPI mods (`ConsoleCommands` and `SaveBackup`). For most users this will be in `"C:\Program Files (x86)\Steam\steamapps\common\Stardew Valley\Mods"`.
            3. Unzip Content Patcher into your `Stardew Valley/Mods` folder, so you end up with `Mods/Content Patcher`.
            4. Unzip Making Biscuits into your `Stardew Valley/Mods` folder, so you end up with `Mods/[CP] MakingBiscuits`.
            5. Launch the game through SMAPI (double-click `Stardew Valley/StardewModdingAPI.exe`, or use the launcher entry you configured when installing SMAPI).
          generate_release_notes: true
          files: |
            MakingBiscuits-${{ inputs.version }}.zip
            vendor/Content Patcher 2.9.1.zip
            vendor/SMAPI-4.5.2-installer.zip
