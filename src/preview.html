<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Making Biscuits — Cat Sprite Preview</title>
  <style>
    :root {
      --bg: #ecac22;
      --panel: #f4e4bc;
      --panel-deep: #e8d4a0;
      --border: #6b4423;
      --border-soft: #a67c52;
      --text: #3b2410;
      --muted: #7a5a35;
      --accent: #3f7a1f;
      --wood: #8b5a2b;
      --grid-line: rgba(107, 68, 35, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Trebuchet MS", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      padding: 1rem 1.5rem;
      border-bottom: 3px solid var(--border);
      background:
        linear-gradient(180deg, #f7e9c8 0%, var(--panel) 55%, var(--panel-deep) 100%);
      box-shadow: 0 2px 0 var(--border-soft);
    }

    header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: var(--text);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    .selector {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .selector label {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
    }

    .cat-select {
      display: flex;
      gap: 0.35rem;
      background: #dfc58a;
      border: 2px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .cat-select button {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.75rem;
      border: 2px solid transparent;
      border-radius: 4px;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .cat-select button:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    .cat-select button.active {
      background: #c8e08a;
      border-color: var(--accent);
      color: #1e3d0c;
    }

    .cat-select img {
      width: 16px;
      height: 16px;
      image-rendering: pixelated;
    }

    main {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    section h2 {
      margin: 0 0 0.75rem;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--wood);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      box-shadow: none;
    }

    .card .label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
    }

    .cursor-icon {
      width: calc(16px * 4);
      height: calc(16px * 4);
      margin-top: calc((32px * 4 - 16px * 4) * 2 / 3);
      margin-bottom: calc((32px * 4 - 16px * 4) / 3);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .playfield {
      position: relative;
      width: 100%;
      height: 280px;
      background:
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        var(--bg);
      background-size: 32px 32px;
      border: 3px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow:
        inset 0 0 0 2px var(--border-soft),
        3px 3px 0 rgba(61, 36, 14, 0.2);
    }

    .playfield:focus {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .playfield .hint {
      position: absolute;
      top: 0.5rem;
      left: 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: rgba(59, 36, 16, 0.55);
      pointer-events: none;
      z-index: 1;
    }

    .animal-sprite {
      display: inline-block;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .walkable-cat {
      position: absolute;
      left: 0;
      top: 0;
      will-change: transform;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.9/babel.min.js"></script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    const ASSETS = {
      aery: {
        sheet: "../[CP] MakingBiscuits/assets/aery.png",
        cursor: "../[CP] MakingBiscuits/assets/cursor-aery.png",
      },
      kiko: {
        sheet: "../[CP] MakingBiscuits/assets/kiko.png",
        cursor: "../[CP] MakingBiscuits/assets/cursor-kiko.png",
      },
    };

    const COLS = 4;
    const ROWS = 8;
    const FRAME = 32;
    const SCALE = 4;

    const STATES = {
      walkDown:  { frames: [0, 1, 2, 3],             label: "Walk down" },
      walkRight: { frames: [4, 5, 6, 7],             label: "Walk right" },
      walkUp:    { frames: [8, 9, 10, 11],           label: "Walk up" },
      walkLeft:  { frames: [12, 13, 14, 15],         label: "Walk left" },
      sit:       { frames: [16, 17, 18, 19],         label: "Sit" },
      lick:      { frames: [20, 21, 22, 23],         label: "Lick paw" },
      lie:       { frames: [24, 25, 26, 27, 30, 31], label: "Lie / fall" },
      sleep:     { frames: [28, 29],                 label: "Sleep" },
    };

    const KEY_DIRS = {
      ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right",
      KeyW: "up", KeyS: "down", KeyA: "left", KeyD: "right",
    };

    const DIR_STATE = {
      up: "walkUp",
      down: "walkDown",
      left: "walkLeft",
      right: "walkRight",
    };

    function cellOf(index) {
      return { col: index % COLS, row: Math.floor(index / COLS) };
    }

    function spriteStyle(sheet, absoluteFrame, scale = SCALE) {
      const { col, row } = cellOf(absoluteFrame);
      return {
        width: FRAME * scale,
        height: FRAME * scale,
        backgroundImage: `url("${sheet}")`,
        backgroundSize: `${COLS * FRAME * scale}px ${ROWS * FRAME * scale}px`,
        backgroundPosition: `${-(col * FRAME * scale)}px ${-(row * FRAME * scale)}px`,
      };
    }

    /** Reusable: static frame or looping animation state from a sprite sheet. */
    function AnimalSprite({ sheet, frame, state, loop = false, fps = 6, scale = SCALE, className = "" }) {
      const seq = useMemo(() => {
        if (frame != null && !loop) return [frame];
        const def = STATES[state];
        if (def) return def.frames;
        if (frame != null) return [frame];
        return [0];
      }, [frame, state, loop]);

      const animating = loop && seq.length > 1;
      const [index, setIndex] = useState(0);

      useEffect(() => {
        setIndex(0);
      }, [sheet, state, frame, loop, seq]);

      useEffect(() => {
        if (!animating) return undefined;
        const ms = 1000 / fps;
        const id = setInterval(() => {
          setIndex((i) => (i + 1) % seq.length);
        }, ms);
        return () => clearInterval(id);
      }, [animating, fps, seq]);

      const absolute = seq[index % seq.length] ?? 0;

      return (
        <div
          className={`animal-sprite ${className}`.trim()}
          style={spriteStyle(sheet, absolute, scale)}
          role="img"
          aria-label={state || `frame ${absolute}`}
        />
      );
    }

    function WalkableCat({ sheet }) {
      const fieldRef = useRef(null);
      const keysRef = useRef(new Set());
      const posRef = useRef({ x: 120, y: 100 });
      const facingRef = useRef("down");
      const movingRef = useRef(false);
      const activeStateRef = useRef(null);
      const [pos, setPos] = useState({ x: 120, y: 100 });
      const [display, setDisplay] = useState({
        mode: "frame",
        state: null,
        frame: STATES.walkDown.frames[0],
      });

      const onKey = useCallback((e, down) => {
        const dir = KEY_DIRS[e.code];
        if (!dir) return;
        e.preventDefault();
        if (e.repeat) return;
        if (down) keysRef.current.add(dir);
        else keysRef.current.delete(dir);
      }, []);

      useEffect(() => {
        const onDown = (e) => onKey(e, true);
        const onUp = (e) => onKey(e, false);
        const onBlur = () => keysRef.current.clear();
        window.addEventListener("keydown", onDown);
        window.addEventListener("keyup", onUp);
        window.addEventListener("blur", onBlur);
        return () => {
          window.removeEventListener("keydown", onDown);
          window.removeEventListener("keyup", onUp);
          window.removeEventListener("blur", onBlur);
        };
      }, [onKey]);

      useEffect(() => {
        const speed = 1.4;
        let raf = 0;
        const tick = () => {
          const keys = keysRef.current;
          let dx = 0;
          let dy = 0;
          if (keys.has("up")) dy -= 1;
          if (keys.has("down")) dy += 1;
          if (keys.has("left")) dx -= 1;
          if (keys.has("right")) dx += 1;

          const moving = dx !== 0 || dy !== 0;
          const field = fieldRef.current?.parentElement;

          if (moving) {
            if (Math.abs(dx) > Math.abs(dy)) {
              facingRef.current = dx > 0 ? "right" : "left";
            } else if (dy !== 0) {
              facingRef.current = dy > 0 ? "down" : "up";
            } else {
              facingRef.current = dx > 0 ? "right" : "left";
            }

            const len = Math.hypot(dx, dy) || 1;
            let { x, y } = posRef.current;
            x += (dx / len) * speed;
            y += (dy / len) * speed;

            if (field) {
              const maxX = Math.max(0, field.clientWidth - FRAME * SCALE);
              const maxY = Math.max(0, field.clientHeight - FRAME * SCALE);
              x = Math.max(0, Math.min(maxX, x));
              y = Math.max(0, Math.min(maxY, y));
            }

            posRef.current = { x, y };
            setPos({ x, y });

            const facing = facingRef.current;
            const state = DIR_STATE[facing];
            if (!movingRef.current || activeStateRef.current !== state) {
              activeStateRef.current = state;
              setDisplay({ mode: "state", state, frame: null });
            }
            movingRef.current = true;
          } else if (movingRef.current) {
            activeStateRef.current = null;
            const first = STATES[DIR_STATE[facingRef.current]].frames[0];
            setDisplay({ mode: "frame", state: null, frame: first });
            movingRef.current = false;
          }

          raf = requestAnimationFrame(tick);
        };
        raf = requestAnimationFrame(tick);
        return () => cancelAnimationFrame(raf);
      }, []);

      return (
        <div
          ref={fieldRef}
          className="walkable-cat"
          style={{
            transform: `translate(${Math.round(pos.x)}px, ${Math.round(pos.y)}px)`,
          }}
        >
          {display.mode === "state" ? (
            <AnimalSprite sheet={sheet} state={display.state} loop fps={8} />
          ) : (
            <AnimalSprite sheet={sheet} frame={display.frame} />
          )}
        </div>
      );
    }

    function PreviewCard({ children, label }) {
      return (
        <div className="card">
          {children}
          <div className="label">{label}</div>
        </div>
      );
    }

    function App() {
      const [cat, setCat] = useState("aery");
      const assets = ASSETS[cat];

      const statics = [
        ["walkDown", "Down (first)"],
        ["walkRight", "Right (first)"],
        ["walkUp", "Up (first)"],
        ["walkLeft", "Left (first)"],
      ];
      const sitLast = STATES.sit.frames[STATES.sit.frames.length - 1];

      return (
        <>
          <header>
            <h1>Making Biscuits — Cat Preview</h1>
            <div className="selector">
              <label>Cat</label>
              <div className="cat-select" role="listbox" aria-label="Select cat">
                {Object.keys(ASSETS).map((name) => (
                  <button
                    key={name}
                    type="button"
                    data-cat={name}
                    className={cat === name ? "active" : ""}
                    role="option"
                    aria-selected={cat === name}
                    onClick={() => setCat(name)}
                  >
                    <img
                      src={ASSETS[name].cursor}
                      alt=""
                      width={16}
                      height={16}
                    />
                    {name}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main>
            <section>
              <h2>Walk around</h2>
              <div
                className="playfield"
                tabIndex={0}
                onPointerDown={(e) => e.currentTarget.focus()}
              >
                <div className="hint">Click here, then Arrow keys or WASD to walk</div>
                <WalkableCat sheet={assets.sheet} />
              </div>
            </section>

            <section>
              <h2>Animations</h2>
              <div className="grid">
                {Object.entries(STATES).map(([key, def]) => (
                  <PreviewCard key={key} label={def.label}>
                    <AnimalSprite
                      sheet={assets.sheet}
                      state={key}
                      loop
                      fps={key.startsWith("walk") ? 8 : 5}
                    />
                  </PreviewCard>
                ))}
              </div>
            </section>

            <section>
              <h2>Static frames</h2>
              <div className="grid">
                {statics.map(([key, label]) => (
                  <PreviewCard key={key} label={label}>
                    <AnimalSprite
                      sheet={assets.sheet}
                      frame={STATES[key].frames[0]}
                    />
                  </PreviewCard>
                ))}
                <PreviewCard label="Sit (last)">
                  <AnimalSprite sheet={assets.sheet} frame={sitLast} />
                </PreviewCard>
                <PreviewCard label="Cursor">
                  <img
                    className="cursor-icon"
                    src={assets.cursor}
                    alt={`${cat} cursor`}
                    width={16}
                    height={16}
                  />
                </PreviewCard>
              </div>
            </section>
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
